baseURL = 'https://limarafaelvaz.github.io/'
theme = 'PaperMod'
themesDir = 'themes'

# Idioma padrão
defaultContentLanguage = 'pt-br'

# Configuração de Autor (Essencial para evitar erro de RSS no Hugo v0.157+)
[author]
    name = "Rafael Vaz de Lima"

[params]
    author = "Rafael Vaz de Lima"
    description = "Senior Software Engineer | High-Scale Systems & AI"

[languages]
    [languages.pt-br]
        languageCode = 'pt-br'
        contentDir = 'content/pt-br'
        title = 'Rafael Vaz | AI DevLog'
        weight = 1
    [languages.en]
        languageCode = 'en-us'
        contentDir = 'content/en'
        title = 'Rafael Vaz | AI Portfolio'
        weight = 2